<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Media</title>
    <meta name="description" content="Interact with my media" />
    <link rel="stylesheet" href="../css/styles.css" />
    <style>

        body {
            margin: 0;
            min-height: 100vh;
            font-family: system-ui, sans-serif;
            display: flex;
            flex-direction: column;
        }

        header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        right: 5000PX;
    }

       
            
            
      

        main {
        display: flex;
        flex-direction: column;
        align-items: center;
        padding-top: 40px;
    }

        

        .mySlides {
            width: 100%;
        }

        .media-video {
            width: 100%;
            display: flex;
            justify-content: center;
        }

        .media-video iframe {
            width: 100%;
            max-width: 900px;
            aspect-ratio: 16 / 9;
            display: block;
            margin: 0 auto;
        }

        .media-image img {
            width: 280px;
            max-width: 90vw;
            height: auto;
        }

        footer {
            text-align: center;
            padding: 1rem;
            font-size: 0.9rem;
            opacity: 0.7;
        }
    </style>
</head>

<body>
         
    <header class="site-header">
        <h1>MEDIA</h1>
    </header>

    <a href="../index.html" class="back-button">
        <img src="../assets/images/BOOKTWO.png" alt="Back">
    </a>

    <main>
        <!-- Media carousel: each slide contains a video release -->
        <div class="slideshow-container">

            <!-- Slide 1 -->
            <div class="mySlides fade">
                <div class="media-video">
                    <iframe
                        src="https://www.youtube.com/embed/RvrMHr29sRE?si=tG-UHLJeixwuHkux"
                        title="Hallomi"
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                        allowfullscreen>
                    </iframe>
                </div>
            </div>

            <!-- Slide 2 -->
            <div class="mySlides fade">
                <div class="media-video">
                    <iframe
                        src="https://www.youtube.com/embed/TBTlVrhQD-0?enablejsapi=1&rel=0"
                        title="BrewTang"
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                        allowfullscreen>
                    </iframe>
                </div>
            </div>

            <!-- Slide 3 -->
            <div class="mySlides fade">
                <div class="media-video">
                    <iframe
                        src="https://www.youtube.com/embed/zlRJsqG19vE?enablejsapi=1&rel=0"
                        title="New Year"
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                        allowfullscreen>
                    </iframe>
                </div>
            </div>

            <!-- Previous/next controls for browsing releases -->
            <a class="prev" onclick="plusSlides(-1)">&#10094;</a>
            <a class="next" onclick="plusSlides(1)">&#10095;</a>
        </div>
        <!-- Dot navigation lets users jump directly to a specific release -->
        <div style="text-align:center; margin-top:1rem;">
            <span class="dot" onclick="currentSlide(1)"></span>
            <span class="dot" onclick="currentSlide(2)"></span>
            <span class="dot" onclick="currentSlide(3)"></span>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 MMK</p>
    </footer>

    <script>
        let slideIndex = 1;

        // Show the first media item once the page is ready
        document.addEventListener("DOMContentLoaded", () => {
            showSlides(slideIndex);
        });

        // Move forward/backward through the media slides
        function plusSlides(n) {
            showSlides((slideIndex += n));
        }

        // Jump to a selected slide from dot navigation
        function currentSlide(n) {
            showSlides((slideIndex = n));
        }

        // Core slideshow logic: hide others, show active slide, sync active dot
        function showSlides(n) {
            let i;
            let slides = document.getElementsByClassName("mySlides");
            let dots = document.getElementsByClassName("dot");

            // Pause YouTube embeds when changing slides without reloading them
            let frames = document.querySelectorAll(".media-video iframe");
            frames.forEach((frame) => {
                frame.contentWindow.postMessage(
                    JSON.stringify({
                        event: "command",
                        func: "pauseVideo",
                        args: []
                    }),
                    "https://www.youtube.com"
                );
            });

            if (n > slides.length) {
                slideIndex = 1;
            }
            if (n < 1) {
                slideIndex = slides.length;
            }

            for (i = 0; i < slides.length; i++) {
                slides[i].style.display = "none";
            }

            for (i = 0; i < dots.length; i++) {
                dots[i].className = dots[i].className.replace(" active", "");
            }

            slides[slideIndex - 1].style.display = "block";
            if (dots[slideIndex - 1]) {
                dots[slideIndex - 1].className += " active";
            }
        }
    </script>

</body>

</html>
